# Source: rolloutdemo/templates/analysis-template.yaml
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: robo-rolloutdemo-smoke-test
  labels:
    app.kubernetes.io/name: robo-rolloutdemo
    helm.sh/chart: rolloutdemo-0.1.0
    app.kubernetes.io/instance: robo
    app.kubernetes.io/managed-by: Helm
spec:
  args:
    - name: route-host
  metrics:
    - name: smoke-test
      provider:
        job:
          spec:
            ttlSecondsAfterFinished: 300
            backoffLimit: 2
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: curl-test
                    image: curlimages/curl:latest
                    command:
                      - sh
                      - -c
                      - |
                        echo "Waiting for 30 seconds before starting the health check..."
                        sleep 30  # Wait for the route to be available
                        echo "Starting health check..."
                        echo "Attempting to reach $ROUTE_HOST"
                        
                        for i in {1..3}; do
                          echo "Attempt $i/3..."
                          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -k --connect-timeout 5 --max-time 10 https://$ROUTE_HOST)
                          echo "Status: $STATUS"
                          if [ "$STATUS" = "200" ]; then
                            echo "PASS"
                            exit 0
                          fi
                          echo "Retrying in 5s..."
                          sleep 5
                        done
                        echo "FAIL"
                        exit 1
                    env:
                      - name: ROUTE_HOST
                        value: "{{args.route-host}}"
---
# Source: rolloutdemo/templates/rollout.yaml
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: robo-rolloutdemo
  labels:
    app: rolloutdemo
    chart: rolloutdemo-0.1.0
    release: robo
    heritage: Helm
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: rolloutdemo
      release: robo
  analysis:
    successfulRunHistoryLimit: 2
    unsuccessfulRunHistoryLimit: 1  
  strategy:
    blueGreen:
      activeService: robo-rolloutdemo-default
      previewService: robo-rolloutdemo-preview-default
      autoPromotionEnabled: true
      autoPromotionSeconds: 30
      scaleDownDelaySeconds: 300
      prePromotionAnalysis:
        templates:
          - templateName: robo-rolloutdemo-smoke-test
        args:
          - name: route-host
            value: robo-rolloutdemo-preview-route-default.apps.e3c5k7g5w3o7p7w.5vc5.p1.openshiftapps.com
  template:
    metadata:
      labels:
        app: rolloutdemo
        release: robo
    spec:
      containers:
        - name: rolloutdemo
          image: "ghcr.io/ihonwub/curly-spork:d4e6b3e1436640c0f46bad709c9b3a03ad930fab"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
          resources:
            limits:
              cpu: 300m
              memory: 512Mi
            requests:
              cpu: 150m
              memory: 256Mi
